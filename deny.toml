[graph]
# cargo-deny is really only ever intended to run on the "normal" tier-1 targets
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = true

[advisories]
version = 2
ignore = [
    # Transitive through `starlark` in the current Codex tag. No safe local
    # upgrade is available from this SDK without moving the Codex dependency.
    "RUSTSEC-2024-0388",
    "RUSTSEC-2024-0436",

    # Transitive through `bm25`/`starlark_map` in the current Codex tag. No safe
    # local upgrade is available from this SDK.
    "RUSTSEC-2025-0057",

    # Transitive through Codex's `rama-dns`/`hickory-resolver` stack. Hickory
    # 0.26.x is semver-incompatible with the pinned Rama prerelease.
    "RUSTSEC-2026-0118",
    "RUSTSEC-2026-0119",

    # Transitive through `age`/`i18n-embed-fl` in Codex secrets support. No safe
    # local upgrade is available from this SDK.
    "RUSTSEC-2026-0173",
]

[bans]
multiple-versions = "allow"
wildcards = 'allow'
deny = [
    { crate = "git2", use-instead = "gix" },
    { crate = "openssl", use-instead = "rustls", wrappers = ["native-tls"], reason = "accepted only through Codex's native-tls stack" },
    { crate = "openssl-sys", use-instead = "rustls", wrappers = ["openssl", "native-tls", "codex-core"], reason = "accepted only underneath Codex's current native-tls/OpenSSL paths" },
    "libssh2-sys",
    { crate = "cmake", use-instead = "cc", wrappers = ["aws-lc-sys"], reason = "accepted only as an aws-lc-sys build dependency from Codex/Rama TLS support" },
    { crate = "windows", reason = "accepted only through current Codex Windows/process wrappers", use-instead = "ideally inline bindings, practically, windows-sys", wrappers = ["codex-windows-sandbox", "process-wrap"] },
]
skip = [
    { crate = "bitflags@1.3.2", reason = "https://github.com/seanmonstar/reqwest/pull/2130 should be in the next version" },
]

[bans.workspace-dependencies]
duplicates = 'deny'
include-path-dependencies = true
unused = 'deny'

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/openai/codex",
    "https://github.com/helix-editor/nucleo.git",
    "https://github.com/openai-oss-forks/tokio-tungstenite",
    "https://github.com/openai-oss-forks/tungstenite-rs",
]

[licenses]
# We want really high confidence when inferring licenses from text
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MPL-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
exceptions = [
    # Use exceptions for these as they only have a single user
    { allow = ["Zlib"], crate = "tinyvec" },
]

# Sigh
[[licenses.clarify]]
crate = "ring"
# SPDX considers OpenSSL to encompass both the OpenSSL and SSLeay licenses
# https://spdx.org/licenses/OpenSSL.html
# ISC - Both BoringSSL and ring use this for their new files
# MIT - "Files in third_party/ have their own licenses, as described therein. The MIT
# license, for third_party/fiat, which, unlike other third_party directories, is
# compiled into non-test libraries, is included below."
# OpenSSL - Obviously
expression = "ISC AND MIT AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
crate = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

# Actually "ISC-style"
[[licenses.clarify]]
crate = "rustls-webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]
